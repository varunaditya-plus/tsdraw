name: Publish packages

on:
  push:
    branches:
      - main

concurrency:
  group: publish-packages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm install --include=optional

      - name: Install Rollup Linux binary
        run: npm install --no-save "@rollup/rollup-linux-x64-gnu@$(node -p 'require(\"./node_modules/rollup/package.json\").version')"

      - name: Build packages
        run: npm run build:core && npm run build:react

      - name: Publish changed packages
        run: npm run publish:changed
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
